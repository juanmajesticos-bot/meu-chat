<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 Meu Chat - Conversa ao Vivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="chat-container">
            <!-- Header do Chat -->
            <div class="chat-header">
                <div class="header-info">
                    <div class="online-dot"></div>
                    <h2>🤖 Sala de Bate-Papo</h2>
                </div>
                <div class="participants">
                    <span id="participantCount">1</span> online
                </div>
            </div>

            <!-- Área das Mensagens -->
            <div class="messages-area" id="messagesArea">
                <div class="welcome-message">
                    ✨ Bem-vindo ao chat! ✨<br>
                    Digite seu nome e comece a conversar!
                </div>
            </div>

            <!-- Input de Nome -->
            <div class="name-container" id="nameContainer">
                <input type="text" id="usernameInput" placeholder="Seu nome..." maxlength="20">
                <button id="setNameBtn" class="btn-primary">Entrar no Chat</button>
            </div>

            <!-- Área de Digitação (inicialmente escondida) -->
            <div class="message-input-container" id="messageContainer" style="display: none;">
                <div class="typing-indicator" id="typingIndicator"></div>
                <div class="input-group">
                    <input type="text" id="messageInput" placeholder="Digite sua mensagem..." maxlength="500">
                    <button id="sendBtn" class="btn-send">📤 Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
