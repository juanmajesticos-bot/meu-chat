<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 CHAT XP - Sistema de Níveis</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <div class="chat-container">
            <!-- Header com Perfil e Nível -->
            <div class="chat-header">
                <div class="user-profile" id="userProfile">
                    <div class="avatar" id="userAvatar">👤</div>
                    <div class="user-stats">
                        <h3 id="userNameDisplay">Carregando...</h3>
                        <div class="level-info">
                            <span class="level-badge" id="userLevel">Nv. 1</span>
                            <span class="level-title" id="userTitle">⭐ Iniciante</span>
                        </div>
                        <div class="xp-bar-container">
                            <div class="xp-bar" id="userXpBar" style="width: 0%"></div>
                            <span class="xp-text" id="userXpText">0/100 XP</span>
                        </div>
                    </div>
                </div>
                <div class="participants">
                    <span id="participantCount">0</span> online
                </div>
            </div>

            <!-- Área das Mensagens -->
            <div class="messages-area" id="messagesArea">
                <div class="welcome-message">
                    🎮 BEM-VINDO AO CHAT XP! 🎮<br>
                    Digite seu nome e comece a conversar!<br>
                    💬 Cada mensagem dá +5 XP! 💬
                </div>
            </div>

            <!-- Input de Nome -->
            <div class="name-container" id="nameContainer">
                <input type="text" id="usernameInput" placeholder="Seu nome..." maxlength="20">
                <button id="setNameBtn" class="btn-primary">🎮 Entrar no Chat</button>
            </div>

            <!-- Área de Digitação -->
            <div class="message-input-container" id="messageContainer" style="display: none;">
                <div class="typing-indicator" id="typingIndicator"></div>
                <div class="input-group">
                    <input type="text" id="messageInput" placeholder="Digite sua mensagem..." maxlength="500">
                    <button id="sendBtn" class="btn-send">📤 Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
