<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💙 BLUE CHAT</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="logo-icon">💙</div>
            <h1>BLUE CHAT</h1>
            <div class="login-input-group">
                <input type="text" id="loginUsername" placeholder="Seu nome" maxlength="20">
                <button id="loginBtn">ENTRAR</button>
            </div>
            <div class="login-info">
                <span>/gunto [msg]</span>
                <span>/kick @user</span>
                <span>/cls</span>
                <span>/forca</span>
                <span>/gartic</span>
            </div>
        </div>
    </div>

    <div class="chat-main" id="chatMain" style="display: none;">
        <div class="chat-container">
            <div class="chat-header">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">---</div>
                        <div class="user-level">
                            <span id="userLevel">Nv.1</span>
                            <span id="userTitle">INICIANTE</span>
                        </div>
                        <div class="xp-bar">
                            <div class="xp-fill" id="xpBarFill"></div>
                            <span id="xpText">0/100 XP</span>
                        </div>
                    </div>
                </div>
                <div class="online-count">👥 <span id="onlineCount">0</span></div>
            </div>

            <div class="messages-area" id="messagesArea">
                <div class="welcome-box">💙 BEM-VINDO! Use /gunto [msg]</div>
            </div>

            <div class="typing-area">
                <input type="text" id="messageInput" placeholder="Digite sua mensagem...">
                <button id="sendBtn">ENVIAR</button>
                <div class="typing-indicator" id="typingIndicator"></div>
            </div>
        </div>
    </div>

    <div id="guntoAlert" class="gunto-alert" style="display: none;"></div>

    <script src="script.js"></script>
</body>
</html>
